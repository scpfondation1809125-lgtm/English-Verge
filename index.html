<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Flow — для начинающих</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            max-width: 860px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 35px 30px 40px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
            transition: 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #0b1e33;
        }
        .logo span {
            color: #2a7de1;
        }

        .stats {
            display: flex;
            gap: 28px;
            font-size: 15px;
            color: #1f3a57;
            font-weight: 500;
        }
        .stats span {
            background: #eef4fa;
            padding: 6px 18px;
            border-radius: 60px;
        }

        .progress-wrap {
            background: #e6edf5;
            height: 8px;
            border-radius: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #2a7de1;
            border-radius: 20px;
            transition: width 0.4s ease;
        }

        .card {
            background: #f8fafd;
            border-radius: 32px;
            padding: 40px 36px;
            border: 1px solid #eaf0f6;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .mission-tag {
            font-size: 14px;
            font-weight: 600;
            color: #2a7de1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .question {
            font-size: 24px;
            font-weight: 500;
            color: #0b1e33;
            margin-bottom: 18px;
            line-height: 1.4;
        }
        .question small {
            font-weight: 400;
            font-size: 18px;
            color: #4a647d;
            display: block;
            margin-top: 6px;
        }

        .theory-block {
            background: #eef4fa;
            padding: 20px 24px;
            border-radius: 20px;
            margin: 10px 0 18px;
            font-size: 17px;
            line-height: 1.6;
            color: #0b1e33;
        }
        .theory-block strong {
            color: #1f5fa8;
        }
        .theory-block .rule {
            background: white;
            padding: 12px 18px;
            border-radius: 14px;
            margin: 10px 0;
            border-left: 4px solid #2a7de1;
        }
        .theory-block .example {
            background: #f8fafd;
            padding: 8px 16px;
            border-radius: 12px;
            margin: 6px 0;
            font-style: italic;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 18px 0 24px;
        }
        .option-btn {
            background: white;
            border: 2px solid #dce5ef;
            border-radius: 18px;
            padding: 16px 12px;
            font-size: 18px;
            font-weight: 500;
            color: #0b1e33;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #2a7de1;
            background: #f2f8ff;
            transform: translateY(-2px);
        }
        .option-btn.correct {
            border-color: #1d9b5c;
            background: #e6f6ef;
            color: #1d9b5c;
        }
        .option-btn.wrong {
            border-color: #d94a4a;
            background: #ffe9e9;
            color: #b33;
        }
        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .feedback {
            font-size: 18px;
            font-weight: 450;
            padding: 14px 0 6px;
            min-height: 56px;
            color: #1f3a57;
        }
        .feedback .ok { color: #1d9b5c; }
        .feedback .fail { color: #c0392b; }
        .feedback .hint-text { color: #2a7de1; font-style: italic; }

        .actions {
            margin-top: auto;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: space-between;
            border-top: 1px solid #e2eaf2;
            padding-top: 24px;
            align-items: center;
        }

        .actions-left {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: white;
            border: 2px solid #d0dce9;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            color: #1f3a57;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover:not(:disabled) {
            border-color: #2a7de1;
            background: #f2f8ff;
        }
        .btn-primary {
            background: #0b1e33;
            border-color: #0b1e33;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1f3a57;
            border-color: #1f3a57;
        }
        .btn-primary:disabled,
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-success {
            background: #1d9b5c;
            border-color: #1d9b5c;
            color: white;
        }
        .btn-success:hover:not(:disabled) {
            background: #16834c;
            border-color: #16834c;
        }
        .btn-outline {
            background: transparent;
            border-color: #bccbd9;
        }
        .btn-danger-outline {
            background: transparent;
            border-color: #d94a4a;
            color: #b33;
        }
        .btn-danger-outline:hover:not(:disabled) {
            background: #ffe9e9;
            border-color: #b33;
        }

        .reset-area {
            margin-top: 24px;
            text-align: center;
        }
        .reset-btn {
            background: none;
            border: none;
            color: #8a9eb0;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline dotted;
        }
        .reset-btn:hover {
            color: #d94a4a;
        }

        @media (max-width: 580px) {
            .app { padding: 20px 16px; }
            .card { padding: 28px 18px; }
            .options { grid-template-columns: 1fr; }
            .question { font-size: 20px; }
            .stats { gap: 12px; font-size: 13px; }
            .stats span { padding: 4px 12px; }
            .actions { flex-direction: column; align-items: stretch; }
            .actions-left { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <div class="logo">English <span>Flow</span></div>
            <div class="stats">
                <span>🏆 <span id="scoreDisplay">0</span></span>
                <span>📌 <span id="levelDisplay">0 / 9</span></span>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>

        <div class="card" id="card">
            <div class="mission-tag" id="missionTag">Миссия 1</div>
            <div class="question" id="question">Загрузка...</div>
            <div id="theoryContainer"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedback"></div>
            <div class="actions">
                <div class="actions-left">
                    <button class="btn btn-outline" id="hintBtn">💡 Подсказка</button>
                    <button class="btn btn-danger-outline" id="retryBtn">🔄 Перепройти</button>
                </div>
                <button class="btn btn-primary" id="nextBtn" disabled>Далее →</button>
            </div>
        </div>

        <div class="reset-area">
            <button class="reset-btn" id="resetBtn">⟲ Сбросить весь прогресс</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  МИССИИ (ПРОСТЫЕ СЛОВА ДЛЯ НОВИЧКОВ)
        // ============================================================
        const missions = [{
            id: 1,
            type: 'theory',
            title: 'Теория: глагол TO BE',
            theory: `
                <div class="theory-block">
                    <strong>📖 Глагол TO BE — "быть, находиться"</strong>
                    <div class="rule">
                        <strong>Я = I am</strong><br>
                        <span class="example">I am a student. (Я студент)</span><br><br>
                        <strong>Ты = You are</strong><br>
                        <span class="example">You are my friend. (Ты мой друг)</span><br><br>
                        <strong>Он / Она / Оно = He / She / It is</strong><br>
                        <span class="example">She is nice. (Она милая)</span><br><br>
                        <strong>Мы = We are</strong><br>
                        <span class="example">We are happy. (Мы счастливы)</span><br><br>
                        <strong>Они = They are</strong><br>
                        <span class="example">They are at home. (Они дома)</span>
                    </div>
                    <div class="rule">
                        <strong>📌 Короткие формы:</strong><br>
                        I am = I'm<br>
                        You are = You're<br>
                        He is = He's<br>
                        She is = She's<br>
                        It is = It's<br>
                        We are = We're<br>
                        They are = They're
                    </div>
                </div>
            `,
            question: 'Прочитайте теорию и нажмите "Далее"',
            options: ['Понял, дальше!'],
            correct: 0,
            hint: 'Запомните: I am, You are, He/She/It is, We are, They are'
        }, {
            id: 2,
            type: 'practice',
            title: 'Слова: СЕМЬЯ',
            question: 'Как по-английски "мама"?',
            options: ['Mother', 'Father', 'Sister', 'Brother'],
            correct: 0,
            hint: 'Начинается с буквы M'
        }, {
            id: 3,
            type: 'practice',
            title: 'Слова: СЕМЬЯ',
            question: 'Как по-английски "папа"?',
            options: ['Mother', 'Father', 'Sister', 'Brother'],
            correct: 1,
            hint: 'Начинается с буквы F'
        }, {
            id: 4,
            type: 'practice',
            title: 'Слова: ЕДА',
            question: 'Как по-английски "хлеб"?',
            options: ['Bread', 'Milk', 'Egg', 'Meat'],
            correct: 0,
            hint: 'Похоже на "брэд"'
        }, {
            id: 5,
            type: 'practice',
            title: 'Слова: ЕДА',
            question: 'Как по-английски "молоко"?',
            options: ['Bread', 'Milk', 'Egg', 'Meat'],
            correct: 1,
            hint: 'Похоже на "милк"'
        }, {
            id: 6,
            type: 'practice',
            title: 'Глагол TO BE',
            question: 'Вставьте правильную форму:<br><small>"She ___ a doctor."</small>',
            options: ['am', 'are', 'is', 'be'],
            correct: 2,
            hint: 'Для She используем IS'
        }, {
            id: 7,
            type: 'practice',
            title: 'Глагол TO BE',
            question: 'Вставьте правильную форму:<br><small>"We ___ friends."</small>',
            options: ['am', 'are', 'is', 'be'],
            correct: 1,
            hint: 'Для We используем ARE'
        }, {
            id: 8,
            type: 'practice',
            title: 'Слова: ДОМ',
            question: 'Как по-английски "дом"?',
            options: ['House', 'Home', 'Room', 'Door'],
            correct: 0,
            hint: 'Похоже на "хаус"'
        }, {
            id: 9,
            type: 'exam',
            title: '🎓 ЭКЗАМЕН',
            question: 'Выберите правильную форму:<br><small>"They ___ at school."</small>',
            options: ['am', 'are', 'is', 'be'],
            correct: 1,
            hint: 'Для They всегда ARE'
        }];

        // ============================================================
        //  СОСТОЯНИЕ
        // ============================================================
        let state = {
            currentLevel: 0,
            score: 0,
            completed: new Array(missions.length).fill(false),
            answered: false,
            selectedOption: null,
            hintUsed: false,
        };

        // ============================================================
        //  ЗАГРУЗКА / СОХРАНЕНИЕ
        // ============================================================
        function loadState() {
            try {
                const raw = localStorage.getItem('englishFlowState');
                if (!raw) return;
                const saved = JSON.parse(raw);
                state.currentLevel = saved.currentLevel ?? 0;
                state.score = saved.score ?? 0;
                state.completed = saved.completed ?? new Array(missions.length).fill(false);
                while (state.completed.length < missions.length) state.completed.push(false);
            } catch (_) {}
        }

        function saveState() {
            localStorage.setItem('englishFlowState', JSON.stringify({
                currentLevel: state.currentLevel,
                score: state.score,
                completed: state.completed,
            }));
        }

        // ============================================================
        //  ОТРИСОВКА
        // ============================================================
        function render() {
            const level = state.currentLevel;
            const mission = missions[level];
            const isCompleted = state.completed[level];
            const isTheory = mission.type === 'theory';

            // Прогресс
            const doneCount = state.completed.filter(v => v === true).length;
            const total = missions.length;
            document.getElementById('progressBar').style.width = `${(doneCount / total) * 100}%`;
            document.getElementById('levelDisplay').textContent = `${doneCount} / ${total}`;
            document.getElementById('scoreDisplay').textContent = state.score;

            // Тег
            let tagText = `Миссия ${level + 1}`;
            if (mission.type === 'theory') tagText += ' 📖 Теория';
            else if (mission.type === 'exam') tagText += ' 🎓 Экзамен';
            else tagText += ' ✏️ Практика';
            document.getElementById('missionTag').textContent = tagText;

            // Вопрос
            document.getElementById('question').innerHTML = mission.question;

            // Теория (только для theory)
            const theoryContainer = document.getElementById('theoryContainer');
            if (mission.type === 'theory') {
                theoryContainer.innerHTML = mission.theory;
            } else {
                theoryContainer.innerHTML = '';
            }

            // Кнопки вариантов
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            mission.options.forEach((text, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = text;
                btn.dataset.index = idx;
                btn.addEventListener('click', () => handleOptionClick(idx));
                if (state.answered || isCompleted) {
                    btn.disabled = true;
                    if (isCompleted && idx === mission.correct) {
                        btn.classList.add('correct');
                    } else if (state.answered && idx === state.selectedOption) {
                        if (idx === mission.correct) btn.classList.add('correct');
                        else btn.classList.add('wrong');
                    } else if (isCompleted && idx === mission.correct) {
                        btn.classList.add('correct');
                    }
                }
                container.appendChild(btn);
            });

            // Обратная связь
            const feedbackEl = document.getElementById('feedback');
            if (isCompleted) {
                feedbackEl.innerHTML = '<span class="ok">✅ Миссия пройдена! Отлично!</span>';
            } else if (state.answered) {
                const isCorrect = (state.selectedOption === mission.correct);
                feedbackEl.innerHTML = isCorrect ?
                    `<span class="ok">✅ Верно! +10 очков</span>` :
                    `<span class="fail">❌ Неверно. Попробуйте ещё раз.</span>`;
            } else {
                feedbackEl.innerHTML = 'Выберите один из вариантов.';
            }

            // Кнопка "Далее"
            const nextBtn = document.getElementById('nextBtn');
            if (isCompleted) {
                if (level < missions.length - 1) {
                    nextBtn.disabled = false;
                    nextBtn.textContent = 'Следующая миссия →';
                } else {
                    nextBtn.disabled = true;
                    nextBtn.textContent = '🏁 Все пройдены!';
                }
            } else {
                nextBtn.disabled = true;
                nextBtn.textContent = isTheory ? '📖 Прочитайте теорию' : '✔️ Ответьте, чтобы продолжить';
            }

            // Подсказка
            const hintBtn = document.getElementById('hintBtn');
            if (isCompleted || state.answered || mission.type === 'theory') {
                hintBtn.disabled = true;
            } else {
                hintBtn.disabled = false;
                hintBtn.onclick = () => {
                    feedbackEl.innerHTML = `<span class="hint-text">💡 ${mission.hint}</span>`;
                    state.hintUsed = true;
                };
            }

            // Кнопка перепрохождения
            const retryBtn = document.getElementById('retryBtn');
            retryBtn.onclick = () => {
                if (confirm('Перепройти эту миссию? Очки не сгорят.')) {
                    state.completed[level] = false;
                    state.answered = false;
                    state.selectedOption = null;
                    saveState();
                    render();
                }
            };

            // Если все пройдены
            if (doneCount === total) {
                document.getElementById('missionTag').textContent = '🎉 ПОЗДРАВЛЯЕМ!';
                document.getElementById('question').innerHTML =
                    'Вы прошли все 9 миссий! <br><small>Отличная работа! Возвращайтесь за новыми уровнями.</small>';
                document.getElementById('theoryContainer').innerHTML = '';
                container.innerHTML = '';
                feedbackEl.innerHTML = '🏆 Вы освоили English Flow!';
                nextBtn.disabled = true;
                nextBtn.textContent = '🌟 Мастер';
                hintBtn.disabled = true;
            }

            saveState();
        }

        // ============================================================
        //  ОБРАБОТКА ОТВЕТА
        // ============================================================
        function handleOptionClick(idx) {
            const level = state.currentLevel;
            const mission = missions[level];

            if (state.answered || state.completed[level]) return;
            if (mission.type === 'theory') {
                // Теория просто отмечается как пройденная
                state.completed[level] = true;
                state.answered = true;
                render();
                return;
            }

            state.answered = true;
            state.selectedOption = idx;

            const isCorrect = (idx === mission.correct);
            if (isCorrect) {
                state.score += 10;
                state.completed[level] = true;
            }

            render();
        }

        // ============================================================
        //  ПЕРЕХОД НА СЛЕДУЮЩУЮ МИССИЮ
        // ============================================================
        function goToNext() {
            const level = state.currentLevel;
            if (!state.completed[level]) return;

            if (level < missions.length - 1) {
                state.currentLevel = level + 1;
                state.answered = false;
                state.selectedOption = null;
                render();
            }
        }

        // ============================================================
        //  СБРОС
        // ============================================================
        function resetProgress() {
            if (!confirm('Сбросить весь прогресс?')) return;
            state.currentLevel = 0;
            state.score = 0;
            state.completed = new Array(missions.length).fill(false);
            state.answered = false;
            state.selectedOption = null;
            saveState();
            render();
        }

        // ============================================================
        //  СТАРТ
        // ============================================================
        document.getElementById('nextBtn').addEventListener('click', goToNext);
        document.getElementById('resetBtn').addEventListener('click', resetProgress);

        loadState();
        if (state.currentLevel >= missions.length) state.currentLevel = missions.length - 1;
        render();
    </script>
</body>
</html>
